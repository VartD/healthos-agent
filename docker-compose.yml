services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healthos
      POSTGRES_PASSWORD: healthos
      POSTGRES_DB: healthos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthos -d healthos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://healthos:healthos@postgres:5432/healthos
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
